<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light">

    <meta name="theme-color" content="#0d9488" />
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CareOPD">

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <title>CareOPD</title>
  </head>
  <body style="margin: 0; background-color: #f8fafc;">
    <div id="root">
      <div style="height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #f8fafc; padding: 0 16px; box-sizing: border-box;">
        <img src="/CareOPD-Logo.png" alt="CareOPD Logo" style="height: 96px; object-fit: contain; margin-bottom: 16px;" />
        <div style="width: 36px; height: 36px; border: 4px solid #e2e8f0; border-top: 4px solid #0d9488; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      </div>
      <style>
        body {
    overscroll-behavior-y: none; /* Stops the PWA from bouncing on pull-to-refresh */
    margin: 0;
  }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
