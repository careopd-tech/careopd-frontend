<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light">

    <meta name="theme-color" content="#0d9488" />
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CareOPD">

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      body {
        margin: 0;
        background-color: #f8fafc;
        overscroll-behavior-y: none;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        transition: opacity 180ms ease;
        z-index: 60;
      }

      #boot-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .launch-screen__content {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }

      .launch-screen__icon {
        width: 5.5rem;
        height: 5.5rem;
        object-fit: contain;
      }
    </style>
    
    <title>CareOPD</title>
  </head>
  <body>
    <div id="boot-splash" class="launch-screen" aria-hidden="true">
      <div class="launch-screen__content">
        <img src="/icon_x192.png" alt="" class="launch-screen__icon" width="96" height="96" />
      </div>
    </div>
    <div id="root">
      <style>
        body {
          overscroll-behavior-y: none;
          margin: 0;
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
