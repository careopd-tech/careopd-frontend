<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light">

    <meta name="theme-color" content="#0d9488" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <title>CareOPD</title>
  </head>
  <body style="margin: 0; background-color: #ffffff;">
    <div id="root">
      <div style="height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #ffffff;">
        <div style="width: 40px; height: 40px; border: 4px solid #f1f5f9; border-top: 4px solid #0d9488; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      </div>
      <style>
        body {
    overscroll-behavior-y: none; /* Stops the PWA from bouncing on pull-to-refresh */
  }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
