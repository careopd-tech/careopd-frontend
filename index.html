<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light">

    <meta name="theme-color" content="#0d9488" />
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CareOPD">

    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      body {
        margin: 0;
        background-color: #f8fafc;
        overscroll-behavior-y: none;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
        transition: opacity 180ms ease;
        z-index: 60;
      }

      #boot-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .launch-screen__content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 1.5rem;
        width: min(22rem, calc(100vw - 3rem));
      }

      .launch-screen__logo {
        width: min(11.75rem, 55vw);
        height: auto;
        object-fit: contain;
      }

      .launch-screen__status {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
        text-align: center;
      }

      .launch-screen__title {
        margin: 0;
        font-size: 1rem;
        line-height: 1.4rem;
        font-weight: 700;
        color: #0f172a;
      }

      .launch-screen__message {
        margin: 0;
        font-size: 0.8125rem;
        line-height: 1.25rem;
        font-weight: 500;
        color: #64748b;
      }

      .launch-screen__progress {
        position: relative;
        width: min(12rem, 100%);
        height: 0.375rem;
        margin-top: 0.25rem;
        border-radius: 9999px;
        overflow: hidden;
        background: #dbeafe;
      }

      .launch-screen__progress-bar {
        position: absolute;
        inset: 0 auto 0 -35%;
        width: 35%;
        border-radius: inherit;
        background: linear-gradient(90deg, #0d9488 0%, #14b8a6 100%);
        animation: launch-progress 1.15s ease-in-out infinite;
      }

      @keyframes launch-progress {
        0% {
          transform: translateX(0);
        }

        100% {
          transform: translateX(390%);
        }
      }
    </style>
    
    <title>CareOPD</title>
  </head>
  <body>
    <div id="boot-splash" class="launch-screen" aria-hidden="true" hidden>
      <div class="launch-screen__content">
        <img src="/icon_x512.png" alt="" class="launch-screen__logo" width="188" height="188" />
        <div class="launch-screen__status">
          <p class="launch-screen__title">Preparing your workspace</p>
          <p class="launch-screen__message">Please wait while CareOPD gets things ready.</p>
          <div class="launch-screen__progress" aria-hidden="true">
            <span class="launch-screen__progress-bar"></span>
          </div>
        </div>
      </div>
    </div>
    <div id="root">
      <style>
        body {
          overscroll-behavior-y: none;
          margin: 0;
        }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
